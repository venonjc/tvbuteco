<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Buteco Premium</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Arial,sans-serif;background:#111;color:#fff}
.top-player{border-bottom:2px solid gold}
.header img{width:100%;height:420px;object-fit:cover;display:block}
.menu-btn{position:fixed;top:100px;left:10px;background:gold;color:#000;padding:10px 15px;border-radius:8px;cursor:pointer;z-index:9999}
.sidebar{position:fixed;left:-250px;top:0;width:250px;height:100%;background:#1a1a1a;transition:.3s;padding-top:80px;z-index:9998}
.sidebar.ativo{left:0}
.sidebar a{display:block;color:#fff;text-decoration:none;padding:15px}
.lista-canais{display:none;flex-wrap:wrap;gap:10px;padding:15px;justify-content:center;background:#000}
.lista-canais.ativo{display:flex}
.canal{width:80px;text-align:center;cursor:pointer}
.canal img{width:80px;height:55px;border:2px solid gold}
.container{display:flex;gap:20px;justify-content:center;padding:20px;flex-wrap:wrap}
.box{border:2px solid gold;padding:10px;border-radius:12px;background:#1a1a1a}
.tv-container{position:relative;width:661px;height:463px}
#tvImagem{width:100%;height:100%}
#playerTv{position:absolute;top:33px;left:47px;width:566px;height:318px;display:none;background:#000}
@media(max-width:768px){.container{flex-direction:column;align-items:center}.tv-container{width:100%;max-width:661px;height:auto}#playerTv{width:85%;height:55%}}
</style>
</head>
<body>

<div class="top-player">
<iframe src="https://player.igng.com.br/player-barra/7018/000000" width="100%" height="31" frameborder="0"></iframe>
</div>

<div class="header">
<img src="https://xatimg.com/image/lRgr3RKIFrEZ.png">
</div>

<div class="menu-btn" onclick="abrirMenu()">☰ MENU</div>

<div id="sidebar" class="sidebar">
<a href="#" onclick="abrirInicio()">🏠 Início</a>
<a href="#" onclick="abrirCanais()">📺 Canais</a>
</div>

<div id="listaCanais" class="lista-canais"></div>

<div class="container">

<div class="box">
<h3>📺 PLAYER BUTECO PREMIUM</h3>
<div class="tv-container">
<img id="tvImagem" src="https://xatimg.com/image/OYa6tG3vv9xU.png">
<video id="playerTv" controls autoplay muted playsinline></video>
</div>
</div>

<div class="box">
<h3>💬 CHAT BUTECO PREMIUM</h3>
<iframe src="https://xat.com/embed/chat.php#id=220535412&gn=Butecopremium" width="650" height="486" frameborder="0"></iframe>
</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<script>
function abrirMenu(){document.getElementById('sidebar').classList.toggle('ativo');}
function abrirCanais(){document.getElementById('listaCanais').classList.toggle('ativo');}
function abrirInicio(){
document.getElementById('listaCanais').classList.remove('ativo');
document.getElementById('playerTv').style.display='none';
}

const lista=document.getElementById('listaCanais');
for(let i=1;i<=20;i++){
lista.innerHTML+=`<div class="canal" onclick="trocarCanal('LINK_STREAM_${i}')">
<img src="canais/${i}.png"><div>${i}</div></div>`;
}

const video=document.getElementById('playerTv');
let hls;

function trocarCanal(url){
video.style.display='block';
if(hls){hls.destroy();}
if(Hls.isSupported()){
hls=new Hls();
hls.loadSource(url);
hls.attachMedia(video);
}else{
video.src=url;
}
}

document.addEventListener('contextmenu',e=>e.preventDefault());
</script>
</body>
</html>
