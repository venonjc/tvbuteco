<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TV Online</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
background:#111;
color:#fff;
}

header{
background:#cc0000;
padding:20px;
text-align:center;
font-size:30px;
font-weight:bold;
}

.container{
max-width:1200px;
margin:auto;
padding:20px;
}

.player{
position:relative;
padding-bottom:56.25%;
height:0;
overflow:hidden;
border-radius:15px;
box-shadow:0 0 20px rgba(255,255,255,.15);
}

.player iframe{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
border:none;
}

.menu{
display:flex;
gap:15px;
margin-top:25px;
flex-wrap:wrap;
justify-content:center;
}

.menu button{
padding:12px 25px;
background:#cc0000;
color:#fff;
border:none;
border-radius:8px;
cursor:pointer;
font-size:16px;
transition:.3s;
}

.menu button:hover{
background:#ff0000;
transform:scale(1.05);
}

footer{
margin-top:40px;
padding:20px;
text-align:center;
background:#1b1b1b;
}
</style>

</head>
<body>

<header>
📺 TV Online
</header>

<div class="container">

<div class="player">
<iframe
src="COLE_AQUI_O_PLAYER_OFICIAL"
allowfullscreen>
</iframe>
</div>

<div class="menu">
<button>SBT</button>
<button>Globo</button>
<button>Record</button>
<button>Band</button>
<button>RedeTV!</button>
</div>

</div>

<footer>
© 2026 TV Online
</footer>

</body>
</html>
