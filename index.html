<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Buteco Premium</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
font-family:Arial,sans-serif;
color:#fff;
background:url('https://xatimg.com/image/rFn6Eso8ctEL.jpg') center center/cover no-repeat fixed;
min-height:100vh;
}
.top-player{border-bottom:2px solid #FFD700}
.header img{width:100%;height:420px;object-fit:cover;display:block}

.menu-fixo{
position:sticky;top:0;z-index:9999;
background:#111;
border-top:2px solid #FFD700;
border-bottom:2px solid #FFD700;
}
.menu-fixo ul{list-style:none;display:flex;justify-content:center}
.menu-fixo li{position:relative}
.menu-fixo a{
display:block;padding:15px 25px;
color:#FFD700;text-decoration:none;font-weight:bold;
}
.menu-fixo a:hover{background:#222}
.submenu{display:none;position:absolute;top:100%;left:0;background:#111;min-width:220px}
.dropdown:hover .submenu{display:block}

.lista-canais{display:none;flex-wrap:wrap;gap:10px;justify-content:center;padding:15px;background:rgba(0,0,0,.85)}
.lista-canais.ativo{display:flex}

.canal{width:80px;text-align:center;cursor:pointer}
.canal img{
width:80px;height:55px;object-fit:cover;
border:2px solid #FFD700;border-radius:6px
}

.container{display:flex;justify-content:center;gap:20px;flex-wrap:wrap;padding:20px}

.box{
background:#1a1a1a;
border:3px solid #FFD700;
outline:2px solid #333;
border-radius:15px;
padding:10px;
}

.titulo{text-align:center;color:#FFD700;margin-bottom:10px}

.tv-container{
position:relative;
width:661px;
height:463px;
}

#tvImagem{
width:100%;
height:100%;
display:block;
}

#playerTv{
position:absolute;
top:33px;
left:47px;
width:566px;
height:318px;
display:none;
background:#000;
}

.footer{
margin-top:20px;
background:#111;
border-top:2px solid #FFD700;
text-align:center;
padding:20px;
}

@media(max-width:768px){
.container{flex-direction:column;align-items:center}
.tv-container{width:100%;max-width:661px;height:auto}
.chat iframe{width:100%}
}
</style>
</head>
<body>

<div class="top-player">
<iframe src="https://player.igng.com.br/player-barra/7018/000000" width="100%" height="31" frameborder="0"></iframe>
</div>

<div class="header">
<img src="https://xatimg.com/image/lRgr3RKIFrEZ.png">
</div>

<div class="menu-fixo">
<ul>
<li><a href="#" onclick="abrirInicio()">🏠 Início</a></li>
<li class="dropdown">
<a href="#">📺 Canais</a>
<ul class="submenu">
<li><a href="#" onclick="abrirCanais()">Todos os Canais</a></li>
</ul>
</li>
</ul>
</div>

<div id="listaCanais" class="lista-canais"></div>

<div class="container">

<div class="box">
<div class="titulo">📺 PLAYER BUTECO PREMIUM</div>
<div class="tv-container">
<img id="tvImagem" src="https://xatimg.com/image/OYa6tG3vv9xU.png">
<video id="playerTv" controls autoplay muted playsinline></video>
</div>
</div>

<div class="box chat">
<div class="titulo">💬 CHAT BUTECO PREMIUM</div>
<iframe src="https://xat.com/embed/chat.php#id=220535412&gn=sertamix" width="650" height="486" frameborder="0"></iframe>
</div>

</div>

<div class="footer">
<h3>🎵 Rádio Buteco Premium</h3>
<p>🇧🇷 Copa do Mundo 2026 • Rumo ao Hexa</p>
<p>www.butecopremium.com.br</p>
</div>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<script>
const lista=document.getElementById('listaCanais');

for(let i=1;i<=20;i++){
lista.innerHTML+=`
<div class="canal" onclick="trocarCanal('LINK_STREAM_${i}')">
<img src="canais/${i}.png">
<div>${i}</div>
</div>`;
}

function abrirCanais(){
document.getElementById('listaCanais').classList.toggle('ativo');
}

function abrirInicio(){
document.getElementById('listaCanais').classList.remove('ativo');
document.getElementById('playerTv').style.display='none';
}

const video=document.getElementById('playerTv');
let hls;

function trocarCanal(url){
video.style.display='block';

if(hls){hls.destroy();}

if(Hls.isSupported()){
hls=new Hls();
hls.loadSource(url);
hls.attachMedia(video);
}else{
video.src=url;
}
}

document.addEventListener('contextmenu',e=>e.preventDefault());
</script>

</body>
</html>
